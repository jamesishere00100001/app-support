<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unirse a Reverse-It</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="¡Has sido invitado a jugar a Reverse-It!" />
  <meta property="og:description" content="Toca para unirte al grupo y empezar a jugar al mejor juego de audio." />
  <meta property="og:url" content="https://jamesishere00100001.github.io/app-support/reverse-it/es/join.html" />
  <meta property="og:image" content="https://jamesishere00100001.github.io/app-support/reverse-it/app-icon.jpg" />
  <meta property="og:image:type" content="image/jpeg" />
  <meta property="og:image:width" content="1024" />
  <meta property="og:image:height" content="1024" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="¡Has sido invitado a jugar a Reverse-It!" />
  <meta name="twitter:description" content="Toca para unirte al grupo y empezar a jugar al mejor juego de audio." />
  <meta name="twitter:image" content="https://jamesishere00100001.github.io/app-support/reverse-it/app-icon.jpg" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0d0d1a;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      color: #fff;
      padding: 32px 24px;
      text-align: center;
    }
    .icon {
      width: 100px; height: 100px;
      border-radius: 22px;
      margin-bottom: 28px;
      box-shadow: 0 0 40px rgba(168, 85, 247, 0.5);
      object-fit: cover;
    }
    h1 { font-size: 26px; font-weight: 700; margin-bottom: 12px; line-height: 1.2; }
    p { font-size: 16px; color: #b0b0d0; margin-bottom: 36px; max-width: 320px; }
    .btn {
      display: inline-block;
      padding: 16px 36px;
      border-radius: 50px;
      font-size: 17px; font-weight: 600;
      text-decoration: none; cursor: pointer; border: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: #fff; margin-bottom: 16px;
      box-shadow: 0 4px 20px rgba(168, 85, 247, 0.4);
    }
    .btn-secondary {
      background: transparent; color: #a855f7;
      border: 2px solid #7c3aed;
      font-size: 15px; padding: 12px 28px;
    }
    .actions { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    #status { margin-top: 24px; font-size: 14px; color: #7070a0; }
  </style>
</head>
<body>
  <img class="icon" src="../app-icon.jpg" alt="Icono de la app Reverse-It" />
  <h1>¡Has sido invitado a Reverse-It!</h1>
  <p>Toca abajo para abrir la app y unirte al grupo. ¿Aún no tienes la app? Descárgala gratis en el App Store.</p>
  <div class="actions">
    <button class="btn btn-primary" id="open-app">Abrir en Reverse-It</button>
    <a class="btn btn-secondary" href="https://apps.apple.com/app/reverse-it/id6761381268">Descargar en el App Store</a>
  </div>
  <p id="status"></p>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var group  = params.get('group');
      var token  = params.get('token');
      if (!group || !token) {
        document.getElementById('status').textContent = 'Enlace de invitación no válido.';
        return;
      }
      var deepLink = 'reverseit://join?group=' + encodeURIComponent(group) + '&token=' + encodeURIComponent(token);
      function openApp() {
        window.location.href = deepLink;
        setTimeout(function () {
          document.getElementById('status').textContent = '¿App no instalada? Usa el enlace de descarga de arriba.';
        }, 2000);
      }
      document.getElementById('open-app').addEventListener('click', openApp);
      setTimeout(openApp, 800);
    })();
  </script>
</body>
</html>
